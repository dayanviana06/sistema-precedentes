# Coleta os precedentes do STJ (automático) + base curada e PUBLICA o site.
# Roda todo dia e a cada envio. Não exige subir arquivos nem configurar mais nada.
name: Atualizar e publicar

on:
  schedule:
    - cron: "0 9 * * *"      # 06h de Brasília, diariamente
  workflow_dispatch: {}       # botão "Run workflow"
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  atualizar-e-publicar:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependência mínima
        run: pip install requests

      - name: Coletar STJ (automático) e consolidar com a base curada
        working-directory: coletor
        run: |
          cp ../dados.json . 2>/dev/null || true
          cp ../dados-manual.json . 2>/dev/null || true
          python build_auto.py
          cp dados.json ../dados.json
          cp changelog.json ../changelog.json 2>/dev/null || true

      - name: Preparar o site
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp dados.json _site/dados.json
          cp changelog.json _site/changelog.json 2>/dev/null || true

      - name: Salvar dados.json atualizado no repositório
        run: |
          git config user.name "coletor-precedentes"
          git config user.email "actions@github.com"
          git add dados.json changelog.json || true
          git diff --cached --quiet || git commit -m "Atualização automática da base (STJ)"
          git push || true

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
